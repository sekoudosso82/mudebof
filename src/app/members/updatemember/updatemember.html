
@if (member()) {
    <div class="container">
      <form [formGroup]="memberForm" (ngSubmit)="UpdateMemberData()" class="card">
        <h2>Update informations</h2>
        <div class="form-group">
          <input type="text"  formControlName="nom" placeholder={{member()?.nom}}>
        </div>
    
        <div class="form-group">
          <input type="text" formControlName="prenoms" placeholder={{member()?.prenoms}}>
        </div>
    
        <div class="form-group">
          <input type="text" formControlName="userName" placeholder={{member()?.userName}}>
        </div>
    
        <div class="form-group">
          <input type="text" formControlName="password" placeholder={{member()?.password}}>
        </div>
    
        <div class="form-group">
          <input type="text" formControlName="location" placeholder={{member()?.location}}>
        </div>
    
        <div class="form-group">
          <input type="number" formControlName="phone" placeholder={{member()?.phone}}>
        </div>
    
        <div class="form-group">
          <input type="email" formControlName="email" placeholder={{member()?.email}}>
        </div>
    
        <!-- <div class="form-group">
          <input type="file" (change)="onFileChange($event)">{{member()?.email}}
        </div>
        <div class="preview" >
            @if (imagePreview) { <img [src]="imagePreview" alt="Preview"> }
        </div> -->
    
        <button id="validerButton" type="submit" [disabled]="memberForm.invalid">Valider</button>
        <!-- <button id="annulerButton" routerLink="/members">Annuler</button> -->
        <button id="cancelButton" routerLink="/members">Annuler</button>
    
      </form>
    </div>
}
