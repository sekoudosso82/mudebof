
<h3>Update ce Membre</h3>
<div class="container">
  <form (ngSubmit)="UpdateMemberData()" class="card">
    <h2>Entrez vos informations</h2>
    <div class="form-group">
      <!-- <label>Nom</label> -->
      <input type="text" 
             [(ngModel)]="member.nom" 
             name="nom" 
             placeholder="{{memberSignal()?.nom}}"> 
    </div>
  
    <div class="form-group">
      <!-- <label>Prenoms</label> -->
      <input type="text" [(ngModel)]="member.Prenoms" 
             name="Prenoms"  placeholder="{{memberSignal()?.prenoms}}">
    </div>
    <div class="form-group">
      <!-- <label>Nom d'utilisateur</label> -->
      <input type="text" [(ngModel)]="member.userName" 
             name="userName" placeholder="{{memberSignal()?.userName}}">
    </div>
    <div class="form-group">
      <!-- <label>Mot de pass</label> -->
      <input type="text" [(ngModel)]="member.password" 
             name="password" placeholder="{{memberSignal()?.password}}">
    </div>
    <div class="form-group">
      <!-- <label>Ville</label> -->
      <input type="text"  [(ngModel)]="member.location" 
             name="location" placeholder="{{memberSignal()?.location}}">
    </div>
    <div class="form-group">
      <!-- <label>Telephone</label> -->
      <input type="number" [(ngModel)]="member.phone" 
             name="phone" placeholder="{{memberSignal()?.phone}}">
    </div>
    <div class="form-group">
      <!-- <label>Email</label> -->
      <input type="email" [(ngModel)]="member.email" 
             name="email" placeholder="{{memberSignal()?.email}}">
    </div>
    <div class="form-group">
      <!-- <label>Email</label> -->
      <input type="text" [(ngModel)]="member.role" 
             name="role" placeholder="{{memberSignal()?.role}}">
    </div>
    <div>
      <label for="accessLevel">Niveau Access</label>
      <select [(ngModel)]="member.accessLevel" name="accessLevel">
        <option value="Membre">Membre</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
  
    <input type="file" (change)="onFileSelected($event)" accept="image/*">
  
    @if(imagePreview) { <img [src]="imagePreview" width="150" height="150"> }
  
    <button id="validerButton" type="submit">Valider</button>
    <button id="cancelButton" routerLink="/members">Annuler</button>
  </form>
</div>
