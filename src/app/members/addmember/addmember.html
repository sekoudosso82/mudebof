<h3>Ajouter un Membre</h3>

<div class="container">
  <form (ngSubmit)="SaveMember()" class="card">
    <h2>Entrez vos informations</h2>
    <div class="form-group">
      <!-- <label>Nom</label> -->
      <input type="text" [(ngModel)]="member.nom" 
              name="nom" placeholder="Entrez votre nom"> 
    </div>
  
    <div class="form-group">
      <!-- <label>Prenoms</label> -->
      <input type="text" [(ngModel)]="member.prenoms" 
              name="prenoms"  placeholder="Entrez votre prenom(s)">
    </div>
    <div class="form-group">
      <!-- <label>Nom d'utilisateur</label> -->
      <input type="text" [(ngModel)]="member.userName" name="userName" placeholder="Entrez votre nom d'utilisateur">
    </div>
    <div class="form-group">
      <!-- <label>Mot de pass</label> -->
      <input type="text" [(ngModel)]="member.password" name="password" placeholder="Creez votre mot de pass">
    </div>
    <div class="form-group">
      <!-- <label>Ville</label> -->
      <input type="text"  [(ngModel)]="member.location" name="location" placeholder="Ville de residence">
    </div>
    <div class="form-group">
      <!-- <label>Telephone</label> -->
      <input type="number" [(ngModel)]="member.phone" name="phone" placeholder="numero Telephone">
    </div>
    <div class="form-group">
      <!-- <label>Email</label> -->
      <input type="email" [(ngModel)]="member.email" name="email" placeholder="Votre email">
    </div>
    <div class="form-group">
      <!-- <label>Email</label> -->
      <input type="text" [(ngModel)]="member.role" name="role" placeholder="Votre role">
    </div>
    <div>
      <label for="accessLevel">Niveau d'access</label>
      <select [(ngModel)]="member.accessLevel" name="role">
        <option value="Membre">Membre</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
  
    <input type="file" (change)="onFileSelected($event)" accept="image/*">
  
    @if(imagePreview) { <img [src]="imagePreview" width="150" height="150"> }
  
    <button id="validerButton" type="submit">Valider</button>
    <button id="cancelButton" routerLink="/members">Annuler</button>
  </form>
</div>
