<h3>update cette activite</h3>

<div class="container">
  <form (ngSubmit)="UpdateactivityData()" class="card">
    <h2>Entrez les informations</h2>
    <div class="form-group">
      <input type="text" [(ngModel)]="activity.activityTitle" 
            name="activityTitle" placeholder="{{activitySignal()?.activityTitle}}" 
            required minlength="3"
            #activityTitle="ngModel"
      > 
      @if(activityTitle.invalid && activityTitle.touched)
      {
        <div>
          @if(activityTitle.errors?.['required'])
          {<small>Titre Obligatoire</small>}
          @if(activityTitle.errors?.['minlength'])
          {<small>le titre doit etre au moins 3 characteres</small>}
        </div>
      } 
 
    </div>
    <div class="form-group">
      <input type="text" [(ngModel)]="activity.activityDescription" name="activityDescription" placeholder="{{activitySignal()?.activityDescription}}">
    </div>

    <div>
      <label for="activityStatus">Status</label>
      <select [(ngModel)]="activity.activityStatus" name="activityStatus">
        <option value="Nouveau">Nouveau</option>
        <option value="En cours">En cours</option>
        <option value="Complete">Complete</option>
      </select>
    </div>

    <input type="file" (change)="onFileSelected($event)" accept="image/*">

    @if(imagePreview) { <img [src]="imagePreview" width="150" height="150"> }

    <button id="validerButton" type="submit" >Valider</button>
    <button id="cancelButton" routerLink="/activities">Annuler</button>

  </form>
</div>
