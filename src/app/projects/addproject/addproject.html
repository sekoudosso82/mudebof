<div class="container">
  <form (ngSubmit)="SaveProject()" class="card">
    <h2>Entrez les informations</h2>
    <div class="form-group">
      <input type="text" [(ngModel)]="project.projectTitle" name="projectTitle" placeholder="Nom du project">
       
    </div>
    <div class="form-group">
      <input type="text" [(ngModel)]="project.projectDescription" name="projectDescription" placeholder="Entrez Description">
    </div>

    <div>
      <label for="projectStatus">Status</label>
      <select [(ngModel)]="project.projectStatus" name="projectStatus">
        <option value="Nouveau">Nouveau</option>
        <option value="En cours">En cours</option>
        <option value="Complete">Complete</option>
      </select>
    </div>

    <input type="file" (change)="onFileSelected($event)" accept="image/*">

    @if(imagePreview) { <img [src]="imagePreview" width="150" height="150"> }

    
    <button id="validerButton" type="submit" >Valider</button>
    <button id="cancelButton" routerLink="/activities">Annuler</button>

  </form>
</div>
